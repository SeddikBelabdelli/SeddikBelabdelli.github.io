<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Belabdelli Seddik</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-body: #0a0f1c;
            --primary: #6366f1;
            --secondary: #06b6d4;
            --blue-e4: #2563eb; 
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-gray: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* --- BACKGROUND --- */
        .background-blobs { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; }
        .blob { position: absolute; filter: blur(80px); opacity: 0.4; }
        .blob-1 { top: -10%; left: -10%; width: 500px; height: 500px; background: var(--primary); border-radius: 40% 60% 70% 30%; }
        .blob-2 { bottom: -10%; right: -10%; width: 400px; height: 400px; background: var(--secondary); border-radius: 60% 40% 30% 70%; }

        nav {
            position: fixed; top: 0; width: 100%; padding: 1.5rem 5%; display: flex; justify-content: space-between; align-items: center; z-index: 1000;
            backdrop-filter: blur(15px); background: rgba(10, 15, 28, 0.8); border-bottom: 1px solid var(--glass-border);
        }
        .nav-links { display: flex; gap: 1.5rem; list-style: none; }
        .nav-links a { color: var(--text-gray); text-decoration: none; font-weight: 500; font-size: 0.9rem; transition: 0.2s; }
        .nav-links a:hover { color: var(--primary); }

        section { padding: 6rem 10%; border-bottom: 1px solid rgba(255, 255, 255, 0.03); }
        .section-title { font-size: 2.5rem; font-weight: 700; margin-bottom: 1rem; }
        .section-subtitle { color: var(--text-gray); margin-bottom: 3rem; font-size: 1.1rem; }

        /* --- STYLES PARCOURS (TIMELINE) --- */
        .timeline { position: relative; max-width: 800px; margin: 2rem 0 0 0; padding-left: 2rem; border-left: 2px solid var(--glass-border); }
        .timeline-item { position: relative; margin-bottom: 2.5rem; }
        .timeline-item::before { 
            content: ''; position: absolute; left: calc(-2rem - 7px); top: 6px; 
            width: 12px; height: 12px; border-radius: 50%; background: var(--secondary); 
            box-shadow: 0 0 10px var(--secondary);
        }
        .t-date { font-weight: 700; color: var(--text-gray); font-size: 0.95rem; display: block; margin-bottom: 0.2rem; }
        .t-title { font-size: 1.3rem; font-weight: 600; margin-bottom: 0.2rem; color: #f1f5f9; }
        .t-place { font-size: 0.95rem; color: var(--secondary); font-weight: 500; display: block; margin-bottom: 0.5rem; }
        .t-desc { color: var(--text-gray); font-size: 0.95rem; }

        /* --- STAGES PRESENTATION BLOCKS --- */
        .stage-container { display: flex; flex-direction: column; gap: 2.5rem; }
        .stage-block {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 2rem;
            transition: 0.3s;
        }
        .stage-block:hover { border-color: var(--primary); background: rgba(255,255,255,0.07); }
        .stage-header { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 1rem; margin-bottom: 1.5rem; }
        .stage-company { font-size: 1.6rem; color: #f1f5f9; font-weight: 700; }
        .stage-company span { color: var(--secondary); font-size: 1.1rem; font-weight: 500; display: block; margin-top: 0.2rem;}
        .stage-date { background: rgba(99, 102, 241, 0.15); color: #a5b4fc; border: 1px solid rgba(99, 102, 241, 0.3); padding: 0.4rem 1rem; border-radius: 50px; font-size: 0.9rem; font-weight: 600; }
        
        .stage-body h4 { font-size: 1.1rem; color: var(--primary); margin-bottom: 0.5rem; font-weight: 600; }
        .stage-body p { color: var(--text-gray); margin-bottom: 1.5rem; font-size: 0.95rem; }
        .stage-missions { list-style: none; padding-left: 0; }
        .stage-missions li { position: relative; padding-left: 1.5rem; color: #e2e8f0; font-size: 0.95rem; margin-bottom: 0.5rem; }
        .stage-missions li::before { content: "→"; position: absolute; left: 0; color: var(--secondary); font-weight: bold; }

        /* --- SKILLS BLOCS --- */
        .bloc-competence { margin-bottom: 3rem; }
        .bloc-title { font-size: 1.5rem; color: var(--primary); margin-bottom: 1.5rem; border-left: 4px solid var(--secondary); padding-left: 10px; }
        .grid-skills { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.2rem; }
        .subskill-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: 0.2s;
        }
        .subskill-card:hover { border-color: var(--secondary); background: rgba(255, 255, 255, 0.04); }
        .subskill-card p { font-size: 0.95rem; color: #f1f5f9; margin-bottom: 1rem; }
        .proof-btn {
            align-self: flex-start;
            font-size: 0.85rem;
            color: var(--secondary);
            text-decoration: none;
            border: 1px solid var(--secondary);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: 0.2s;
        }
        .proof-btn:hover { background: var(--secondary); color: var(--bg-body); }

        /* --- VEILLE TECHNOLOGIQUE --- */
        .veille-layout { display: grid; grid-template-columns: 1fr 2fr; gap: 3rem; }
        @media (max-width: 768px) { .veille-layout { grid-template-columns: 1fr; } }
        .veille-info { background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(6, 182, 212, 0.05)); border: 1px solid rgba(99, 102, 241, 0.2); border-radius: 20px; padding: 2rem; height: fit-content; }
        .v-card { background: var(--glass); padding: 1.5rem; border-radius: 16px; border: 1px solid var(--glass-border); margin-bottom: 1rem; transition: 0.3s; }
        .v-card:hover { background: rgba(255,255,255,0.08); }

            background: rgba(220, 38, 38, 0.1); 
            border: 1px solid rgba
